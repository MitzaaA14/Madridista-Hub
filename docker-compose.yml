name: student-${USER:-CHANGE_ME}

services:
  db:
    image: postgres:16-alpine
    container_name: student-${USER:-CHANGE_ME}-db
    environment:
      POSTGRES_USER:     ${DB_USER:-${SUBDOMAIN:-${USER:-app}}}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-${SUBDOMAIN:-${USER:-app}}-demo-pass-2026}
      POSTGRES_DB:       ${DB_NAME:-${SUBDOMAIN:-${USER:-app}}}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-${SUBDOMAIN:-${USER:-app}}}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [studlab_net]
    restart: unless-stopped

  api:
    build:
      context: ./RealMadridWeb
      dockerfile: Dockerfile
    container_name: student-${USER:-CHANGE_ME}-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "Host=student-${USER:-CHANGE_ME}-db;Port=5432;Database=${DB_NAME:-${SUBDOMAIN:-${USER:-app}}};Username=${DB_USER:-${SUBDOMAIN:-${USER:-app}}};Password=${DB_PASSWORD:-${SUBDOMAIN:-${USER:-app}}-demo-pass-2026}"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    expose: ["8080"]
    networks: [studlab_net]
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: student-${USER:-CHANGE_ME}-frontend
    depends_on:
      - api
    volumes:
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    expose: ["80"]
    networks: [studlab_net]
    restart: unless-stopped

volumes:
  db_data:

networks:
  studlab_net:
    external: true
    name: studlab_net



