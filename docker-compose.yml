version: '3.8'

services:
  db:
    image: postgres:16
    container_name: realmadrid_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: RealMadridPassword2026
      POSTGRES_DB: realmadrid_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: ./RealMadridWeb
      dockerfile: Dockerfile
    container_name: realmadrid_web
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "Host=db;Port=5432;Database=realmadrid_cms;Username=admin;Password=RealMadridPassword2026"
    depends_on:
      - db

volumes:
  postgres_data:



